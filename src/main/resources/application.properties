# application.properties
spring.application.name=SIGMA

# PostgreSQL con PostGIS
spring.datasource.url=jdbc:postgresql://localhost:5432/sigma_db
spring.datasource.username=postgres
spring.datasource.password=as
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA y Hibernate
spring.jpa.database-platform=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor
server.port=8080


